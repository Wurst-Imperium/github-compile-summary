plugins {
	id "groovy-gradle-plugin"
	id "maven-publish"
}

gradlePlugin {
	plugins {
		githubCompileSummary {
			id = "net.wimods.github-compile-summary"
			implementationClass = "net.wimods.gradle.GitHubCompileSummaryPlugin"
		}
	}
}

publishing {
	repositories {
		maven {
			name = "staging"
			url = layout.buildDirectory.dir("maven-repo")
		}
	}
}
